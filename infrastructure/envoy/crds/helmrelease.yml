apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-crds
  namespace: envoygateway
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: envoy-crds
  install:
    remediation:
      retries: 1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
